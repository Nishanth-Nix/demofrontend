<!DOCTYPE html>
<html>
<head>
<title>Camera Background Removal</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
</head>
<body>

<h2>Camera Capture with Background Removal Preview</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<br>
<button onclick="capture()">Capture & Send Original</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Start camera
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => video.srcObject = stream);

// Setup MediaPipe Selfie Segmentation
const segmentation = new SelfieSegmentation({locateFile: (file) =>
  `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
segmentation.setOptions({modelSelection: 1});
segmentation.onResults(onResults);

// Draw video and remove background
function onResults(results){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // original image
    ctx.drawImage(video, 0, 0);

    const mask = results.segmentationMask;

    // create background as transparent
    ctx.globalCompositeOperation = 'destination-in';
    ctx.drawImage(mask, 0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'source-over';
}

// Continuously send video frames for segmentation
async function startSegmentation(){
    const videoFrame = async () => {
        await segmentation.send({image: video});
        requestAnimationFrame(videoFrame);
    }
    videoFrame();
}
startSegmentation();

// Capture original and send to server
function capture(){
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    const tempCtx = tempCanvas.getContext("2d");
    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(function(blob){
        let formData = new FormData();
        formData.append("image", blob, "capture.png");

        fetch("https://untrenched-zayne-unintensified.ngrok-free.dev/upload", {
            method: "POST",
            body: formData
        }).then(()=>alert("success"));
    });
}
</script>

</body>
</html>
